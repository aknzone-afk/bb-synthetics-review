<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>B.B. Synthetics Review Assistant</title>
  <meta
    name="description"
    content="A premium mobile review assistant for B.B. Synthetics that delivers polished customer review drafts before opening Google."
  />
  <meta property="og:title" content="B.B. Synthetics Review Assistant" />
  <meta
    property="og:description"
    content="Premium review drafts for B.B. Synthetics that copy instantly and open the Google review page."
  />
  <meta property="og:type" content="website" />
  <link rel="stylesheet" href="./review-page.css" />
</head>
<body>
  <main class="page-shell">
    <section class="card card-single" aria-labelledby="reviewAssistantHeading">
      <div class="sr-only" id="reviewAssistantHeading">Review Assistant</div>

      <div class="actions actions-priority">
        <button id="leaveReviewBtn" class="primary-btn" type="button">LEAVE APPRECIATION</button>
      </div>

      <article class="review-box" aria-live="polite">
        <div class="quote-mark" aria-hidden="true">&ldquo;</div>
        <p id="reviewText">Preparing a review draft...</p>
      </article>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabase-config.js"></script>
  <script src="./review-page.js"></script>
</body>
</html>
